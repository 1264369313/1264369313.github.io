<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBTI 人格测试</title>
  <style>
    :root {
      --bg1: #667eea;
      --bg2: #764ba2;
      --card: rgba(255, 255, 255, 0.12);
      --card-solid: rgba(255, 255, 255, 0.92);
      --text: #ffffff;
      --dark: #1f2937;
      --muted: #6b7280;
      --accent: #8b5cf6;
      --accent2: #06b6d4;
      --success: #22c55e;
      --shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
    }

    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.25;
      z-index: 0;
    }

    .shape1 {
      width: 250px;
      height: 250px;
      background: #ffffff;
      top: 40px;
      left: -60px;
    }

    .shape2 {
      width: 220px;
      height: 220px;
      background: #06b6d4;
      bottom: 60px;
      right: -40px;
    }

    .shape3 {
      width: 180px;
      height: 180px;
      background: #ec4899;
      top: 45%;
      left: 65%;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 16px 60px;
    }

    .hero {
      text-align: center;
      padding: 30px 10px 25px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin: 0 0 12px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .hero p {
      margin: 0 auto;
      max-width: 680px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .glass-card {
      backdrop-filter: blur(18px);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .intro-card {
      padding: 24px;
      margin-top: 26px;
      text-align: center;
    }

    .intro-card h2 {
      margin-top: 0;
      font-size: 1.5rem;
    }

    .intro-card p {
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.8;
      margin-bottom: 22px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.25s;
      font-weight: 700;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffffff, #e9d5ff);
      color: #4c1d95;
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(255, 255, 255, 0.35);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.28);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.24);
    }

    .test-section {
      display: none;
      margin-top: 28px;
    }

    .progress-wrap {
      margin-bottom: 18px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 0.95rem;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22d3ee, #c084fc);
      border-radius: 999px;
      transition: 0.3s;
    }

    .question-card {
      padding: 26px;
    }

    .question-number {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .options {
      display: grid;
      gap: 16px;
    }

    .option {
      position: relative;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 16px;
      padding: 18px 18px 18px 54px;
      cursor: pointer;
      transition: 0.25s;
      line-height: 1.6;
      user-select: none;
    }

    .option:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.22);
    }

    .option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option .radio {
      position: absolute;
      top: 20px;
      left: 18px;
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      transition: 0.2s;
    }

    .option.selected {
      background: rgba(255, 255, 255, 0.28);
      border-color: rgba(255, 255, 255, 0.55);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .option.selected .radio {
      border-color: #fff;
      background: radial-gradient(circle at center, #fff 0 42%, transparent 46%);
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .result-section {
      display: none;
      margin-top: 30px;
    }

    .result-card {
      background: var(--card-solid);
      color: var(--dark);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 30px 24px;
    }

    .result-top {
      text-align: center;
      margin-bottom: 24px;
    }

    .result-top h2 {
      margin: 0;
      font-size: 1.15rem;
      color: var(--muted);
      font-weight: 600;
    }

    .mbti-type {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 900;
      margin: 10px 0 8px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .mbti-name {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .mbti-desc {
      color: #4b5563;
      max-width: 720px;
      margin: 0 auto;
      line-height: 1.85;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin-top: 26px;
    }

    .result-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
    }

    .result-box h3 {
      margin: 0 0 10px;
      font-size: 1.02rem;
      color: #111827;
    }

    .result-box p {
      margin: 0;
      color: #4b5563;
      line-height: 1.7;
      font-size: 0.96rem;
    }

    .dimension-list {
      display: grid;
      gap: 16px;
      margin-top: 28px;
    }

    .dimension-item {
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #e5e7eb;
    }

    .dimension-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 700;
      color: #111827;
    }

    .dimension-bar {
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .dimension-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #06b6d4, #8b5cf6);
    }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.78);
      margin-top: 28px;
      font-size: 0.92rem;
    }

    @media (max-width: 700px) {
      .result-grid {
        grid-template-columns: 1fr;
      }

      .question-text {
        font-size: 1.18rem;
      }

      .question-card,
      .result-card,
      .intro-card {
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>
  <div class="bg-shape shape3"></div>

  <div class="container">
    <section class="hero">
      <h1>MBTI 人格测试</h1>
      <p>
        通过一组简短的问题，探索你在能量来源、信息获取、决策方式和生活组织上的偏好，
        了解自己更接近哪一种 MBTI 人格类型。
      </p>
    </section>

    <section class="intro-card glass-card" id="intro">
      <h2>开始你的性格探索</h2>
      <p>
        本测试包含 12 道题，每题请选择更符合你日常行为和偏好的选项。
        测试结果仅供参考，但它能帮助你更好地认识自己的思维模式与沟通风格。
      </p>
      <button class="btn btn-primary" onclick="startTest()">开始测试</button>
    </section>

    <section class="test-section" id="testSection">
      <div class="progress-wrap">
        <div class="progress-text">
          <span id="progressLabel">第 1 / 12 题</span>
          <span id="progressPercent">8%</span>
        </div>
        <div class="progress-bar">
          <div class="progress" id="progressBar"></div>
        </div>
      </div>

      <div class="glass-card question-card">
        <div class="question-number" id="questionNumber">问题 1</div>
        <div class="question-text" id="questionText"></div>

        <div class="options" id="options"></div>

        <div class="nav-buttons">
          <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">上一题</button>
          <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
        </div>
      </div>
    </section>

    <section class="result-section" id="resultSection">
      <div class="result-card">
        <div class="result-top">
          <h2>你的 MBTI 类型是</h2>
          <div class="mbti-type" id="mbtiType">INTJ</div>
          <div class="mbti-name" id="mbtiName">建筑师</div>
          <p class="mbti-desc" id="mbtiDesc"></p>
        </div>

        <div class="result-grid">
          <div class="result-box">
            <h3>优势特质</h3>
            <p id="mbtiStrength"></p>
          </div>
          <div class="result-box">
            <h3>潜在挑战</h3>
            <p id="mbtiWeakness"></p>
          </div>
        </div>

        <div class="dimension-list">
          <div class="dimension-item">
            <div class="dimension-label">
              <span id="eiLabel">E / I</span>
              <span id="eiValue"></span>
            </div>
            <div class="dimension-bar">
              <div class="dimension-fill" id="eiBar"></div>
            </div>
          </div>

          <div class="dimension-item">
            <div class="dimension-label">
              <span id="snLabel">S / N</span>
              <span id="snValue"></span>
            </div>
            <div class="dimension-bar">
              <div class="dimension-fill" id="snBar"></div>
            </div>
          </div>

          <div class="dimension-item">
            <div class="dimension-label">
              <span id="tfLabel">T / F</span>
              <span id="tfValue"></span>
            </div>
            <div class="dimension-bar">
              <div class="dimension-fill" id="tfBar"></div>
            </div>
          </div>

          <div class="dimension-item">
            <div class="dimension-label">
              <span id="jpLabel">J / P</span>
              <span id="jpValue"></span>
            </div>
            <div class="dimension-bar">
              <div class="dimension-fill" id="jpBar"></div>
            </div>
          </div>
        </div>

        <div class="result-actions">
          <button class="btn btn-primary" onclick="restartTest()">重新测试</button>
          <button class="btn btn-secondary" onclick="window.print()">打印结果</button>
        </div>
      </div>
    </section>

    <div class="footer">
      © 2026 MBTI Personality Test | Designed for your personal homepage
    </div>
  </div>

  <script>
    const questions = [
      {
        text: "在聚会或社交场合中，你通常会：",
        options: [
          { text: "主动与很多人交流，结束后会感到充满能量", dimension: "E" },
          { text: "更喜欢和少数熟人深入交谈，结束后需要独处恢复", dimension: "I" }
        ]
      },
      {
        text: "你更倾向于关注：",
        options: [
          { text: "眼前真实、具体、可观察的事实和细节", dimension: "S" },

        ]
      },
      {
        text: "做决定时，你更看重：",
        options: [

      },
      {
        text: "面对工作或生活安排时，你更喜欢：",

        ]

      {

        ]
      },
      {

          { text: "常常临近截止时效率更高，更能激发状态", dimension: "P" }
        ]
      },
      {
        text: "周末安排中，你更倾向于：",
        options: [
          { text: "与朋友相聚、外出活动，生活更热闹", dimension: "E" },
          { text: "独处或与少数亲近的人相处，享受安静", dimension: "I" }
        ]
      },
      {
        text: "你更相信：",
        options: [
          { text: "经验和事实，脚踏实地更可靠", dimension: "S" },
          { text: "直觉和灵感，跳出现有框架去思考", dimension: "N" }
        ]
      },
      {
        text: "在团队中出现冲突时，你更倾向于：",
        options: [
          { text: "从理性和规则出发，寻找最合理的方案", dimension: "T" },
          { text: "考虑每个人的感受，努力维持关系和谐", dimension: "F" }
        ]
      },
      {
        text: "旅行时，你更喜欢：",
        options: [
          { text: "提前规划路线、住宿和时间安排", dimension: "J" },
          { text: "边走边看，随心决定下一站", dimension: "P" }
        ]
      }
    ];

    const mbtiData = {

        strength: "战略思维强、独立自主、擅长分析与规划、追求高标准。",

      ISFP: {

      ESTP: {
        name: "企业家",
        desc: "精力充沛、果断、善于应对变化，喜欢行动和刺激，敢于冒险并抓住机会。",
        strength: "行动力强、适应快、现实果断、善于社交。",
        weakness: "可能冲动、缺乏耐心，不爱长期规划。"
      },
      ESFP: {
        name: "表演者",
        desc: "外向、乐观、热爱生活，喜欢与人互动并享受当下，能够为 окружающие 带来活力与快乐。",
        strength: "热情、友善、乐于分享、感染力强。",
        weakness: "可能较情绪化，容易分散注意力，回避严肃规划。"
      }
    };

    let currentQuestion = 0;
    let answers = new Array(questions.length).fill(null);

    function startTest() {
      document.getElementById("intro").style.display = "none";
      document.getElementById("testSection").style.display = "block";
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      document.getElementById("questionNumber").textContent = `问题 ${currentQuestion + 1}`;
      document.getElementById("questionText").textContent = q.text;

      const optionsEl = document.getElementById("options");
      optionsEl.innerHTML = "";

      q.options.forEach((opt, index) => {
        const label = document.createElement("label");
        label.className = "option";

        if (answers[currentQuestion] === index) {
          label.classList.add("selected");
        }

        label.innerHTML = `
          <input type="radio" name="option" value="${index}">
          <span class="radio"></span>
          <span>${opt.text}</span>
        `;

        label.addEventListener("click", () => {
          answers[currentQuestion] = index;
          renderQuestion();
        });

        optionsEl.appendChild(label);
      });

      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById("progressBar").style.width = `${progress}%`;
      document.getElementById("progressLabel").textContent = `第 ${currentQuestion + 1} / ${questions.length} 题`;
      document.getElementById("progressPercent").textContent = `${Math.round(progress)}%`;

      document.getElementById("prevBtn").style.visibility = currentQuestion === 0 ? "hidden" : "visible";
      document.getElementById("nextBtn").textContent = currentQuestion === questions.length - 1 ? "查看结果" : "下一题";
    }

    function nextQuestion() {
      if (answers[currentQuestion] === null) {
        alert("请选择一个选项后再继续。");
        return;
      }

      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    }

    function showResult() {
      const scores = {
        E: 0, I: 0,
        S: 0, N: 0,
        T: 0, F: 0,
        J: 0, P: 0
      };

      questions.forEach((q, i) => {
        const selectedIndex = answers[i];
        const dimension = q.options[selectedIndex].dimension;
        scores[dimension]++;
      });

      const type =
        (scores.E >= scores.I ? "E" : "I") +
        (scores.S >= scores.N ? "S" : "N") +
        (scores.T >= scores.F ? "T" : "F") +
        (scores.J >= scores.P ? "J" : "P");

      const result = mbtiData[type];

      document.getElementById("mbtiType").textContent = type;
      document.getElementById("mbtiName").textContent = result.name;
      document.getElementById("mbtiDesc").textContent = result.desc;
      document.getElementById("mbtiStrength").textContent = result.strength;
      document.getElementById("mbtiWeakness").textContent = result.weakness;

      renderDimension("ei", "外向 E", "内向 I", scores.E, scores.I);
      renderDimension("sn", "实感 S", "直觉 N", scores.S, scores.N);
      renderDimension("tf", "思考 T", "情感 F", scores.T, scores.F);
      renderDimension("jp", "判断 J", "知觉 P", scores.J, scores.P);

      document.getElementById("testSection").style.display = "none";
      document.getElementById("resultSection").style.display = "block";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderDimension(prefix, left, right, leftValue, rightValue) {
      const total = leftValue + rightValue;
      const leftPercent = Math.round((leftValue / total) * 100);
      const rightPercent = 100 - leftPercent;

      let dominant = leftValue >= rightValue
        ? `${left} ${leftPercent}%`
        : `${right} ${rightPercent}%`;

      document.getElementById(`${prefix}Label`).textContent = `${left} / ${right}`;
      document.getElementById(`${prefix}Value`).textContent = dominant;
      document.getElementById(`${prefix}Bar`).style.width = `${Math.max(leftPercent, rightPercent)}%`;
    }

    function restartTest() {
      currentQuestion = 0;
      answers = new Array(questions.length).fill(null);
      document.getElementById("resultSection").style.display = "none";
      document.getElementById("intro").style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>
</body>
</html>
